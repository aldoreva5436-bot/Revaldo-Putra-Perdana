<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flamboyan Coffee</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:linear-gradient(135deg,#1b1b1b,#2d1f18,#3e2723);
color:#fff;
}

.container{padding:20px;max-width:1200px;margin:auto;}

.header{text-align:center;margin-bottom:30px;}
.header img{width:80px;}
.header h1{margin-top:10px;text-shadow:0 0 10px orange;}
.header p{color:#ddd;}

/* MENU */
.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:15px;
backdrop-filter:blur(10px);
transition:.3s;
}

.card:hover{transform:translateY(-5px);}

.card h3{color:#ffb74d;}
.price{color:#ffcc80;margin:5px 0;}

.btn{
padding:6px 10px;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:5px;
}

.add{background:#6d4c41;color:#fff;}
.order{background:#25D366;color:#fff;}

/* CART */
.cart-box{
margin-top:30px;
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:15px;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:8px 0;
}

.qty{
display:flex;
gap:5px;
}

.qty button{
padding:3px 8px;
}

.total{margin-top:10px;font-weight:bold;}

/* INPUT */
input,textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:10px;
border:none;
}

.checkout{
margin-top:10px;
background:#25D366;
color:white;
padding:10px;
border:none;
width:100%;
border-radius:10px;
cursor:pointer;
}

/* FLOAT */
.wa{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}
.wa img{width:30px;}

.badge{
position:absolute;
top:10px;
right:10px;
background:red;
color:white;
padding:3px 7px;
border-radius:50%;
font-size:12px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="logo.jpg">
<h1>☕ Flamboyan Coffee</h1>
<p>Ngopi nyaman, harga bersahabat</p>
</div>

<div class="menu">

<!-- ITEM -->
<div class="card">
<h3>Nasi Goreng</h3>
<div class="price">Rp10.000</div>
<button class="btn add" onclick="add('Nasi Goreng',10000)">+ Keranjang</button>
<button class="btn order" onclick="order('Nasi Goreng',10000)">Pesan</button>
</div>

<div class="card">
<h3>Ayam Bakar</h3>
<div class="price">Rp15.000</div>
<button class="btn add" onclick="add('Ayam Bakar',15000)">+ Keranjang</button>
<button class="btn order" onclick="order('Ayam Bakar',15000)">Pesan</button>
</div>

<div class="card">
<h3>Kopi</h3>
<div class="price">Rp5.000</div>
<button class="btn add" onclick="add('Kopi',5000)">+ Keranjang</button>
<button class="btn order" onclick="order('Kopi',5000)">Pesan</button>
</div>

</div>

<!-- CART -->
<div class="cart-box">
<h2>🛒 Keranjang <span id="count">0</span></h2>

<div id="cart"></div>

<div class="total" id="total">Total: Rp0</div>

<label>Nama</label>
<input id="name">

<label>Catatan</label>
<textarea id="note"></textarea>

<button class="checkout" onclick="checkout()">Checkout WhatsApp</button>

</div>

</div>

<a href="https://wa.me/6285366759351" class="wa">
<img src="whatsapp.png">
</a>

<script>
let cart=[];

function add(name,price){
let item=cart.find(i=>i.name==name);
if(item){item.qty++;}
else{cart.push({name,price,qty:1});}
render();
alert("Ditambahkan ke keranjang!");
}

function render(){
let html="";
let total=0;
let count=0;

cart.forEach((item,i)=>{
total+=item.price*item.qty;
count+=item.qty;

html+=`
<div class="cart-item">
${item.name} (${item.qty})
<div class="qty">
<button onclick="minus(${i})">-</button>
<button onclick="plus(${i})">+</button>
</div>
</div>`;
});

document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText="Total: Rp"+total;
document.getElementById("count").innerText=count;
}

function plus(i){cart[i].qty++;render();}
function minus(i){cart[i].qty--;if(cart[i].qty<=0)cart.splice(i,1);render();}

function order(name,price){
let text=encodeURIComponent("Pesan: "+name+" Rp"+price);
window.open("https://wa.me/6281234567890?text="+text);
}

function checkout(){
let name=document.getElementById("name").value;
let note=document.getElementById("note").value;

if(!name)return alert("Isi nama dulu!");

let msg="Halo, saya "+name+" ingin pesan:\n";

cart.forEach(i=>{
msg+=`- ${i.name} x${i.qty}\n`;
});

if(note) msg+="\nCatatan: "+note;

window.open("https://wa.me/6285366759351?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
