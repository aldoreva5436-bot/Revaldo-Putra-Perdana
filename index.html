<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMC Gen Z Creative</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff6600, #ff9966);
            margin: 0;
            padding: 0;
            text-align: center;
            color: #333;
        }

        h1 {
            color: white;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            padding: 20px;
        }

        .box {
            background: white;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #ff6600;
            cursor: pointer;
            transition: 0.3s;
            min-height: 120px;
            font-size: 14px;
        }

        .box:hover {
            background: #ff6600;
            color: white;
            transform: scale(1.05);
        }

        .title {
            font-weight: bold;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <h1>Business Model Canvas - Gen Z Creative</h1>

    <div class="container">
        <div class="box"><div class="title">Key Partners</div></div>
        <div class="box"><div class="title">Key Activities</div></div>
        <div class="box"><div class="title">Value Propositions</div></div>
        <div class="box"><div class="title">Customer Relationships</div></div>
        <div class="box"><div class="title">Customer Segments</div></div>
        <div class="box"><div class="title">Key Resources</div></div>
        <div class="box"><div class="title">Channels</div></div>
        <div class="box"><div class="title">Cost Structure</div></div>
        <div class="box"><div class="title">Revenue Streams</div></div>
    </div>

    <script>
        const boxes = document.querySelectorAll(".box");

        boxes.forEach(box => {
            box.addEventListener("click", () => {
                let isi = prompt("Isi bagian ini:");
                if (isi) {
                    box.innerHTML = "<div class='title'>" + box.innerText.split("\n")[0] + "</div>" + isi;
                }
            });
        });
    </script>

</body>
</html>
