<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flamboyan Coffee</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:linear-gradient(135deg,#1b1b1b,#2d1f18,#3e2723);
color:#fff;
}

.container{padding:20px;max-width:1200px;margin:auto;}

.header{text-align:center;margin-bottom:30px;}
.header img{width:80px;border-radius:50%;}
.header h1{margin-top:10px;text-shadow:0 0 10px orange;}
.header p{color:#ddd;}

/* IG LINK */
.ig-link a{color:#ffb74d;text-decoration:none;}

/* BMC */
.bmc{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin:20px 0;
}
.bmc-box{
background:rgba(255,255,255,0.08);
padding:10px;
border-radius:10px;
cursor:pointer;
text-align:center;
}
.bmc-box:hover{background:rgba(255,255,255,0.2);}
.wide{grid-column:span 2;}

/* MENU */
.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.card{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:15px;
}

.card h3{color:#ffb74d;}
.price{color:#ffcc80;}

.btn{padding:6px 10px;border:none;border-radius:10px;margin-top:5px;cursor:pointer;}
.add{background:#6d4c41;color:white;}
.order{background:#25D366;color:white;}

/* CART */
.cart-box{
margin-top:30px;
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:15px;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:5px 0;
}

.total{margin-top:10px;font-weight:bold;}

input,textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:10px;
border:none;
}

.checkout{
margin-top:10px;
background:#25D366;
color:white;
padding:10px;
border:none;
width:100%;
border-radius:10px;
cursor:pointer;
}

/* FLOAT */
.wa,.ig{
position:fixed;
right:20px;
width:60px;height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}
.wa{bottom:20px;background:#25D366;}
.ig{bottom:90px;background:#E1306C;}

.wa img,.ig img{width:30px;}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="logo.jpg">
<h1>☕ Flamboyan Coffee</h1>
<p>Tempat ngopi nyaman & estetik</p>

<p class="ig-link">
📷 <a href="https://instagram.com/flmboyan.coffe_" target="_blank">
@flmboyan.coffe_
</a>
</p>
</div>

<h2 style="text-align:center;">📊 Business Model Canvas</h2>

<div class="bmc">
<div class="bmc-box" onclick="bmc('Key Partners','Supplier, ojek online, IG')">Key Partners</div>
<div class="bmc-box" onclick="bmc('Key Activities','Masak, seduh kopi')">Key Activities</div>
<div class="bmc-box wide" onclick="bmc('Value','Tempat nyaman + WiFi')">Value</div>
<div class="bmc-box" onclick="bmc('Customer','Mahasiswa, pekerja')">Customer</div>
<div class="bmc-box" onclick="bmc('Relationship','Pelayanan ramah')">Relationship</div>
<div class="bmc-box" onclick="bmc('Resources','Tempat, alat')">Resources</div>
<div class="bmc-box" onclick="bmc('Channels','WA, IG')">Channels</div>
<div class="bmc-box" onclick="bmc('Cost','Bahan, listrik')">Cost</div>
<div class="bmc-box wide" onclick="bmc('Revenue','Jual makanan minuman')">Revenue</div>
</div>

<h2 style="margin:20px 0;">🍽️ Menu</h2>

<div class="menu">

<div class="card">
<h3>Nasi Goreng</h3>
<div class="price">Rp10.000</div>
<button class="btn add" onclick="add('Nasi Goreng',10000)">+ Keranjang</button>
<button class="btn order" onclick="order('Nasi Goreng',10000)">Pesan</button>
</div>

<div class="card">
<h3>Ayam Bakar</h3>
<div class="price">Rp15.000</div>
<button class="btn add" onclick="add('Ayam Bakar',15000)">+ Keranjang</button>
<button class="btn order" onclick="order('Ayam Bakar',15000)">Pesan</button>
</div>

<div class="card">
<h3>Kopi</h3>
<div class="price">Rp5.000</div>
<button class="btn add" onclick="add('Kopi',5000)">+ Keranjang</button>
<button class="btn order" onclick="order('Kopi',5000)">Pesan</button>
</div>

</div>

<div class="cart-box">
<h2>🛒 Keranjang (<span id="count">0</span>)</h2>
<div id="cart"></div>

<div class="total" id="total">Total: Rp0</div>

<input id="name" placeholder="Nama">
<textarea id="note" placeholder="Catatan"></textarea>

<button class="checkout" onclick="checkout()">Checkout WA</button>
</div>

</div>

<a href=https://www.instagram.com/flamboyan.coffe_?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==target="_blank" class="ig">
<img src="instagram.png">
</a>

<a href="https://wa.me/6281234567890" target="_blank" class="wa">
<img src="whatsapp.png">
</a>

<script>
let cart=[];

function bmc(t,d){alert(t+"\\n\\n"+d);}

function add(name,price){
let item=cart.find(i=>i.name==name);
if(item)item.qty++;
else cart.push({name,price,qty:1});
render();
}

function render(){
let html="",total=0,count=0;
cart.forEach((i,index)=>{
total+=i.price*i.qty;
count+=i.qty;
html+=`${i.name} x${i.qty}<br>`;
});
document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText="Total: Rp"+total;
document.getElementById("count").innerText=count;
}

function order(name,price){
window.open("https://wa.me/6285366759351?text="+encodeURIComponent("Pesan "+name));
}

function checkout(){
let name=document.getElementById("name").value;
if(!name)return alert("Isi nama!");

let msg="Halo saya "+name+" pesan:\\n";
cart.forEach(i=>{msg+=i.name+" x"+i.qty+"\\n";});

window.open("https://wa.me/6285366759351?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
